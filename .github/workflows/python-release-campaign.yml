name: Python Release (Campaign-Enabled)

on:
  workflow_dispatch:
    inputs:
      overrideVersion:
        description: Manually force a version
        type: string
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ADIOS2_CUSTOM_VERSION_OVERRIDE: ${{ github.event.inputs.overrideVersion }}

jobs:
  build_wheels_linux_x86_64:
    name: Build wheels (Linux x86_64, Campaign enabled)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Generate common version file
        run: cmake -P scripts/ci/gh-actions/config/adios-version.cmake && cat VERSION.TXT

      - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        env:
          CIBW_BUILD: cp312-manylinux_x86_64 cp313-manylinux_x86_64
          CIBW_BEFORE_ALL: yum install -y libcurl-devel openssl-devel
          CIBW_CONFIG_SETTINGS: 'cmake.define.ADIOS2_USE_Campaign=ON'

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: wheels-linux-x86_64
          path: wheelhouse/*.whl

  build_wheels_linux_aarch64:
    name: Build wheels (Linux aarch64, Campaign enabled)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Generate common version file
        run: cmake -P scripts/ci/gh-actions/config/adios-version.cmake && cat VERSION.TXT

      - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        env:
          CIBW_BUILD: cp312-manylinux_aarch64 cp313-manylinux_aarch64
          CIBW_BEFORE_ALL: yum install -y libcurl-devel openssl-devel
          CIBW_CONFIG_SETTINGS: 'cmake.define.ADIOS2_USE_Campaign=ON'
          CIBW_ARCHS_LINUX: aarch64

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: wheels-linux-aarch64
          path: wheelhouse/*.whl

  test_wheels:
    name: Test wheels
    needs: [build_wheels_linux_x86_64, build_wheels_linux_aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          pattern: wheels-linux-*
          path: dist
          merge-multiple: true

      - run: python -m pip install --find-links=dist adios2

      - run: python -c "import adios2; print('adios2 version:', adios2.__version__); print('FileReader available:', hasattr(adios2, 'FileReader'))"

  publish_release:
    name: Publish to GitHub Release
    needs: test_wheels
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'release' && github.event.action == 'published')
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload artifacts
        uses: softprops/action-gh-release@4c11bfe087a313e4c24042528214fbda7385d42b # v2.1.0
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
